services:
  postgres:
    image: postgres:16-alpine
    container_name: cti-mobile-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cti_mobile
      POSTGRES_USER: cti_mobile
      POSTGRES_PASSWORD: cti_mobile_password
    ports:
      - "5432:5432"
    volumes:
      - cti_mobile_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cti_mobile -d cti_mobile"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  cti_mobile_postgres_data:
